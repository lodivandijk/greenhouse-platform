spring.application.name=greenhouse-platform

server.address=0.0.0.0
server.port=8080

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

info.app.name=Greenhouse Platform
info.app.version=0.1.0

spring.datasource.url=jdbc:postgresql://localhost:5432/greenhouse
spring.datasource.username=greenhouse_app
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
